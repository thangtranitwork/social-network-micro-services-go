events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------
    # Load Balancer for API Gateway Instances (HTTP)
    # ----------------------------------------------------
    upstream api_gateway {
        server 127.0.0.1:11111;
        server 127.0.0.1:11112;
    }

    # ----------------------------------------------------
    # Load Balancer for Chat Service Instances (HTTP & WS)
    # ----------------------------------------------------
    upstream chat_service {
        server 127.0.0.1:10084;
        server 127.0.0.1:10184;
    }

    server {
        listen 11110; # Entrance LB port for API Gateway
        server_name localhost;

        location / {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Gateway routing if needed
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    server {
        listen 10284; # Entrance LB port for Chat Service
        server_name localhost;

        location / {
            proxy_pass http://chat_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support for Chat Service (/v1/chat/ws)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
