events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        # Docker internal DNS resolves 'api-gateway' to all replica IPs
        server api-gateway:11111;
    }

    server {
        listen 11111;

        # Support large payloads (for file uploads via file-service proxy)
        client_max_body_size 100M;

        location / {
            proxy_pass http://api_gateway;

            # Standard headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable WebSockets / persistent connections (Crucial for Chat and VoIP Calls)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Increase timeouts for long-lived WebSocket connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}
