syntax = "proto3";

package pb;

option go_package = "social-network-go/pb";

service AdService {
    rpc SyncAd (AdCampaignRequest) returns (SyncAdResponse);
    rpc DeleteAd (DeleteAdRequest) returns (DeleteAdResponse);
}

message AdCampaignRequest {
    string id = 1;
    string title = 2;
    string description = 3;
    string media_url = 4;
    string target_url = 5;
    string status = 6;
    string advertiser_id = 7;
}

message SyncAdResponse {
    bool success = 1;
    string message = 2;
}

message DeleteAdRequest {
    string id = 1;
}

message DeleteAdResponse {
    bool success = 1;
    string message = 2;
}
